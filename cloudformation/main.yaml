Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsHostnames: false
      EnableDnsSupport: true
      Tags: 
        - Key: "Name"
          Value: "Devops-VPC"
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: 
        - Key: "Name"
          Value: "Devops-Internet-Gateway"
  InternetGatewayVPCAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC # Required
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      Tags: 
        - Key: "Name"
          Value: "Public-Route-Table"
      VpcId: !Ref VPC # Required
  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicRouteTable # Required
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: "10.0.0.0/24"
      MapPublicIpOnLaunch: true
      Tags: 
        - Key: "Name"
          Value: "Public-Subnet"
      VpcId: !Ref VPC # Required
  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable # Required
      SubnetId: !Ref PublicSubnet # Required
  PublicSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Public Security Group" # Required
      GroupName: "Devops-Public-Security-Group"
      Tags: 
        - Key: "Name"
          Value: "Devops-Public-Security-Group"
      VpcId: !Ref VPC
  PublicSecurityGroupEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      CidrIp: "0.0.0.0/0"
      Description: "Allow all egress"
      FromPort: -1
      GroupId: !Ref PublicSecurityGroup # Required
      IpProtocol: "-1" # Required
      ToPort: -1
  PublicSecurityGroupIngressSSH:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      CidrIp: "171.246.207.64/32"
      Description: "Allow ssh from user ip"
      FromPort: 22
      GroupId: !Ref PublicSecurityGroup
      IpProtocol: "tcp" # Required
      ToPort: 22
  PublicSecurityGroupIngressPing:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      CidrIp: "171.246.207.64/32"
      Description: "Allow ssh from user ip"
      FromPort: -1
      GroupId: !Ref PublicSecurityGroup
      IpProtocol: "icmp" # Required
      ToPort: -1
  Keypair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: "Devops-Key-Pair" # Required
      PublicKeyMaterial: >
        ssh-rsa  v1nh2oz4@vinh-MS-7C52
      Tags: 
        - Key: "Name"
          Value: "Devops-Key-Pair"
  PublicEC2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: "ami-091138d0f0d41ff90"
      InstanceType: "t2.micro"
      KeyName: !Ref Keypair
      PrivateIpAddress: "10.0.0.4"
      SecurityGroupIds: 
        - !Ref PublicSecurityGroup
      SubnetId: !Ref PublicSubnet
      Tags: 
        - Key: "Name"
          Value: "Devops-Public-EC2"


  PrivateEIP:
    Type: AWS::EC2::EIP
    Properties:
      Tags: 
        - Key: "Name"
          Value: "Devops-Private-EIP"

  PrivateNatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt PrivateEIP.AllocationId
      AvailabilityMode: "regional"
      ConnectivityType: "public"
      Tags: 
        - Key: "Name"
          Value: "Devops-Private-Nat-Gateway"
      VpcId: !Ref VPC 

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      Tags: 
        - Key: "Name"
          Value: "Private-Route-Table"
      VpcId: !Ref VPC # Required
  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref PrivateNatGateway
      RouteTableId: !Ref PrivateRouteTable # Required
  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: "10.0.10.0/24"
      Tags: 
        - Key: "Name"
          Value: "Private-Subnet"
      VpcId: !Ref VPC # Required
  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable # Required
      SubnetId: !Ref PrivateSubnet # Required
  PrivateSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Private Security Group" # Required
      GroupName: "Devops-Private-Security-Group"
      Tags: 
        - Key: "Name"
          Value: "Devops-Private-Security-Group"
      VpcId: !Ref VPC
  PrivateSecurityGroupEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      CidrIp: "0.0.0.0/0"
      Description: "Allow all egress"
      FromPort: -1
      GroupId: !Ref PrivateSecurityGroup # Required
      IpProtocol: "-1" # Required
      ToPort: -1
  PrivateSecurityGroupIngressSSH:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      SourceSecurityGroupId: !Ref PublicSecurityGroup
      Description: "Allow ssh from public secuirty group"
      FromPort: 22
      GroupId: !Ref PrivateSecurityGroup
      IpProtocol: "tcp" # Required
      ToPort: 22
  PrivateSecurityGroupIngressPing:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      SourceSecurityGroupId: !Ref PublicSecurityGroup
      Description: "Allow ssh from public secuirty group"
      FromPort: -1
      GroupId: !Ref PrivateSecurityGroup
      IpProtocol: "icmp" # Required
      ToPort: -1

  PrivateEC2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: "ami-091138d0f0d41ff90"
      InstanceType: "t2.micro"
      KeyName: !Ref Keypair
      PrivateIpAddress: "10.0.10.8"
      SecurityGroupIds: 
        - !Ref PrivateSecurityGroup
      SubnetId: !Ref PrivateSubnet
      Tags: 
        - Key: "Name"
          Value: "Devops-Private-EC2"

