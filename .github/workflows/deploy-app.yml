name: Deploy Microservice to AWS EC2 (K3s)

on:
  push:
    paths:
      - 'microservices/**'
  workflow_dispatch:

env:
  DOCKER_IMAGE: devops-microservice

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies and Run Tests
        run: |
          cd microservices/app
          npm install
          npm test

      - name: SonarCloud Quality Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'microservices/app/'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0' # Do not fail the build for demonstration, just report

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./microservices/app
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.run_number }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Starting deployment on EC2 ==="
            
            # 1. Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo dnf update -y
              sudo dnf install -y docker
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ec2-user
            fi

            # 2. Install K3s (lightweight Kubernetes) if not present
            if ! command -v kubectl &> /dev/null; then
              echo "Installing K3s..."
              curl -sfL https://get.k3s.io | sh -
              sudo chmod 644 /etc/rancher/k3s/k3s.yaml
            fi

            # Ensure kubectl commands can run with k3s config
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            # 3. Create microservices manifests dynamically on host
            mkdir -p ~/microservices
            
            cat << 'EOF' > ~/microservices/deployment.yaml
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: devops-microservice
              labels:
                app: devops-microservice
            spec:
              replicas: 2
              selector:
                matchLabels:
                  app: devops-microservice
              template:
                metadata:
                  labels:
                    app: devops-microservice
                spec:
                  containers:
                  - name: devops-microservice
                    image: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.run_number }}
                    imagePullPolicy: Always
                    ports:
                    - containerPort: 3000
                    resources:
                      limits:
                        cpu: "500m"
                        memory: "256Mi"
                      requests:
                        cpu: "250m"
                        memory: "128Mi"
                    livenessProbe:
                      httpGet:
                        path: /health
                        port: 3000
                      initialDelaySeconds: 10
                      periodSeconds: 15
                    readinessProbe:
                      httpGet:
                        path: /health
                        port: 3000
                      initialDelaySeconds: 5
                      periodSeconds: 10
            EOF

            cat << 'EOF' > ~/microservices/service.yaml
            apiVersion: v1
            kind: Service
            metadata:
              name: devops-microservice-service
            spec:
              selector:
                app: devops-microservice
              ports:
                - protocol: TCP
                  port: 80
                  targetPort: 3000
              type: LoadBalancer
            EOF

            # 4. Deploy resources to K3s cluster
            echo "Applying manifests..."
            sudo kubectl apply -f ~/microservices/deployment.yaml
            sudo kubectl apply -f ~/microservices/service.yaml
            
            # Wait for deployment roll out
            echo "Waiting for rollout status..."
            sudo kubectl rollout status deployment/devops-microservice --timeout=60s
            
            echo "=== Deployment successful! ==="
